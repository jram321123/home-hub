<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <section>
        <div id="time" class="time">--:--</div>
        <div id="date" class="date">Loading date...</div>
      </section>
      <section class="weather-summary">
        <div class="weather-icon">☁️</div>
        <div>
          <div id="temp" class="temp">--°</div>
          <div id="condition" class="condition">Weather</div>
        </div>
      </section>
    </header>

    <section class="grid">
      <article class="card card-large">
        <h2>Today</h2>
        <ul id="todayList" class="list"></ul>
      </article>

      <article class="card">
        <h2>Weather</h2>
        <div id="weatherDetails" class="details"></div>
      </article>

      <article class="card card-large">
        <h2>This Week</h2>
        <div id="weekList" class="week"></div>
      </article>

      <article class="card">
        <h2>Family To‑Do</h2>
        <ul id="todoList" class="checklist"></ul>
      </article>

      <article class="card">
        <h2>Grocery List</h2>
        <ul id="groceryList" class="checklist"></ul>
      </article>

      <article class="card">
        <h2>Home Controls</h2>
        <div class="home-controls">
          <button>Lights</button>
          <button>Garage</button>
          <button>Thermostat</button>
          <button>Cameras</button>
        </div>
        <p class="muted">Future smart home area</p>
      </article>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
